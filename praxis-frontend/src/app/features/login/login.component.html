<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Admin Login</mat-card-title>
      <mat-card-subtitle>Bitte melde dich an</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Benutzername</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
            Benutzername ist Pflicht.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Passwort</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
            Passwort ist Pflicht.
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full" type="submit" [disabled]="loading()">
          <mat-spinner *ngIf="loading()" diameter="18"></mat-spinner>
          <span *ngIf="!loading()">Einloggen</span>
        </button>

        <p class="error" *ngIf="error()">{{ error() }}</p>
      </form>
    </mat-card-content>
  </mat-card>
</div>
