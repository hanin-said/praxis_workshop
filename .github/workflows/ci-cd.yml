# GitHub Actions CI/CD Pipeline für PraxisForm
# Backend: Spring Boot (Java 21) mit Maven
# Frontend: Angular mit npm

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  # ============================================
  # BACKEND JOBS
  # ============================================

  backend-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://localhost:27017/praxis-test
      JWT_SECRET: test-secret-key-at-least-32-characters-long
      JWT_EXP_MINUTES: "60"
      SPRING_PROFILES_ACTIVE: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        working-directory: praxis
        run: |
          chmod +x ./mvnw
          ./mvnw verify -B
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: praxis/target/surefire-reports/*.xml
          retention-days: 7
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: praxis/target/site/jacoco/
          retention-days: 7

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build JAR
        working-directory: praxis
        run: |
          chmod +x ./mvnw
          ./mvnw package -DskipTests -B
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: praxis/target/*.jar
          retention-days: 1

  # ============================================
  # FRONTEND JOBS
  # ============================================

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: praxis-frontend/package-lock.json
      - name: Install & Lint
        working-directory: praxis-frontend
        run: |
          npm ci --prefer-offline
          npx ng lint || echo "Linting nicht konfiguriert, wird übersprungen"
    continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: praxis-frontend/package-lock.json
      - name: Build
        working-directory: praxis-frontend
        run: |
          npm ci --prefer-offline
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: praxis-frontend/dist/
          retention-days: 1

  # ============================================
  # DOCKER BUILD JOBS
  # ============================================

  docker-backend:
    runs-on: ubuntu-latest
    needs: backend-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./praxis
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/backend:latest

  docker-frontend:
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./praxis-frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/frontend:latest

  # ============================================
  # DEPLOY JOB (manuell)
  # ============================================
  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
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-backend, docker-frontend]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://dev.praxis-form.de
    steps:
      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 87.106.50.149
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          envs: REPO_LC
          script: |
            set -e
            cd /opt/praxis-form

            # Docker Registry Login mit PAT
            echo '${{ secrets.GHCR_PAT }}' | docker login -u '${{ github.actor }}' --password-stdin ghcr.io

            # Docker Compose Command ermitteln
            if docker compose version &> /dev/null; then
              DC='docker compose'
            else
              echo 'Kein docker compose gefunden!' && exit 1
            fi

            # Image-Referenzen in docker-compose.yml von GitLab auf GHCR umstellen
            sed -i "s|registry.gitlab.com/[^:]*backend:|ghcr.io/${{ env.REPO_LC }}/backend:|g" docker-compose.yml
            sed -i "s|registry.gitlab.com/[^:]*frontend:|ghcr.io/${{ env.REPO_LC }}/frontend:|g" docker-compose.yml

            # Alte Container stoppen und entfernen
            $DC down --remove-orphans

            # Images pullen
            $DC pull

            # Container neu starten
            $DC up -d --force-recreate --remove-orphans

            # Alte Images aufräumen
            docker image prune -f

            echo 'Deployment abgeschlossen!'

